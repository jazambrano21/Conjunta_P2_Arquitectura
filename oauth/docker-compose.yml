version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: andesfin-postgres
    environment:
      POSTGRES_DB: andesfin
      POSTGRES_USER: andesfin
      POSTGRES_PASSWORD: andesfin123
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - andesfin-network

  app:
    build: .
    container_name: andesfin-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/andesfin
      SPRING_DATASOURCE_USERNAME: andesfin
      SPRING_DATASOURCE_PASSWORD: andesfin123
    depends_on:
      - postgres
    networks:
      - andesfin-network

networks:
  andesfin-network:
    driver: bridge
